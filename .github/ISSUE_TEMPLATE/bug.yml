name: Bug
description: Signaler un comportement reproductible sans donnée personnelle
title: "[Bug] "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: "Ne joignez jamais de relevé réel, identifiant, clé ou donnée financière personnelle."
  - type: input
    id: version
    attributes:
      label: Version Ostiro
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Domaine
      options: [Calcul, Import CSV, Base locale, Interface, Installateur, Export]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes de reproduction avec données fictives
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Résultat attendu et résultat observé
    validations:
      required: true
